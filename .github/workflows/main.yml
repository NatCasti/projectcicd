name: Pipeline Integration Continue - Redmine 
on: 
  push: 
    branches: [ main ] 
    
jobs: 
  run-redmine-tests: 
    runs-on: ubuntu-latest 
    
    steps:
      - name: Etape 1 - Recuperer le code source 
        uses: actions/checkout@v4
      - name: Etape 2 - Installer Python 3.10 
        uses: actions/setup-python@v5 
        with: 
          python-version: '3.10'
          
      - name: Etape 3 - Installer les dependances 
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
          
        - name: Etape 4 - Exécuter le test de connexion 
        run: | 
          pytest tests/test_connexion.py